run_name: "jetclass1_full_omnijet"

# JetClass I (all 10 classes) with frozen OmniJet-alpha generative backbone.
# Identical dataset to jetclass1_full; only the encoder backend changes.
dataset:
  source: "jetclass1"
  jetclass1_path: "/n/holystore01/LABS/iaifi_lab/Lab/sambt/JetClass"
  jetclass1_split: "train"
  num_jets_per_class: 20000   # increased from 3000 for better coverage
  classes:
    - HToBB         # H → bb̄
    - HToCC         # H → cc̄
    - HToGG         # H → gg
    - HToWW2Q1L     # H → WW → qqℓν (semi-leptonic)
    - HToWW4Q       # H → WW → qqqq (fully hadronic)
    - TTBar         # tt̄ (fully hadronic)
    - TTBarLep      # tt̄ (semi-leptonic)
    - WToQQ         # W → qq̄
    - ZJetsToNuNu   # Z → νν̄ + jets
    - ZToQQ         # Z → qq̄

physics_encoder:
  type: "omnijet_foundation"
  freeze: true
  unfreeze_last_n_layers: 0  # 0 = fully frozen; set 1-3 to unfreeze last N GPT blocks
