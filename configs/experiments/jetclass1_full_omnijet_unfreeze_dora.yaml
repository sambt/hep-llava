run_name: "jetclass1_full_omnijet_unfreeze_dora"

# JetClass I (all 10 classes): OmniJet backbone with last 2 layers unfrozen,
# DoRA instead of standard LoRA, larger LoRA rank targeting all linear layers.
# This is the recommended "best effort" config for JetClass-I experiments.

dataset:
  source: "jetclass1"
  jetclass1_path: "/n/holystore01/LABS/iaifi_lab/Lab/sambt/JetClass"
  jetclass1_split: "train"
  num_jets_per_class: 20000
  classes:
    - HToBB         # H → bb̄
    - HToCC         # H → cc̄
    - HToGG         # H → gg
    - HToWW2Q1L     # H → WW → qqℓν (semi-leptonic)
    - HToWW4Q       # H → WW → qqqq (fully hadronic)
    - TTBar         # tt̄ (fully hadronic)
    - TTBarLep      # tt̄ (semi-leptonic)
    - WToQQ         # W → qq̄
    - ZJetsToNuNu   # Z → νν̄ + jets
    - ZToQQ         # Z → qq̄

physics_encoder:
  type: "omnijet_foundation"
  freeze: true
  unfreeze_last_n_layers: 2  # unfreeze last 2 of 3 GPT blocks during Stage 1 + 2

stage1:
  learning_rate: 5.0e-4      # slightly lower to not destabilize the unfrozen layers
  contrastive:
    enabled: true
    weight: 0.1
    temperature: 0.07
    proj_dim: 128

stage2:
  lora:
    rank: 64                 # higher rank to better capture physics knowledge
    alpha: 128
    dropout: 0.05
    use_dora: true           # Weight-Decomposed LoRA (DoRA) — consistently better than LoRA
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
