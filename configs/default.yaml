# PhysLLaVA Configuration
# ======================

# ============================================================
# DATA DIRECTORY — Set this to your cluster storage path
# All large artifacts (datasets, models, checkpoints) go here
# ============================================================
data_dir: "/n/holystore01/LABS/iaifi_lab/Users/sambt/hep-llava-data/"  # <-- CHANGE THIS

# ============================================================
# API TOKENS — Environment variable names for credentials
# These env vars must be set in the shell before running.
# ============================================================
env:
  hf_token_var: "HF_TOKEN"            # HuggingFace token (for gated models like Llama 3.1)
  openrouter_token_var: "OPENROUTER_KEY"  # OpenRouter API key (for LLM-generated captions)

# Dataset
dataset:
  # ── Source selection ────────────────────────────────────────────────────────
  # "jetclass2" (default): downloads from HuggingFace (jet-universe/jetclass2)
  # "jetclass1": reads from locally downloaded ROOT files (JetClass, arxiv:2202.03772)
  source: "jetclass2"

  # Required when source=jetclass1: path to JetClass root dir
  # (the directory that contains train_100M/, val_5M/, test_20M/)
  jetclass1_path: null
  jetclass1_split: "train"   # "train", "val", or "test"

  name: "jet-universe/jetclass2"
  num_jets_per_class: 3000
  max_constituents: 128
  # 10 classes selected from JetClass-II (arxiv:2405.12972)
  # 8 Res2P resonance classes (from Res2P_0000.parquet, ~7000-7700 jets per label)
  # 2 QCD classes (from QCD_0000.parquet, most common sub-types)
  classes:
    - Res2P_bb      # X -> bb (label 0)
    - Res2P_cc      # X -> cc (label 1)
    - Res2P_ss      # X -> ss (label 2)
    - Res2P_uu      # X -> uu (label 4)
    - Res2P_gg      # X -> gg (label 5)
    - Res2P_WW4q    # X -> WW -> qqqq (label 6, 4-prong)
    - Res2P_WWlv    # X -> WW -> qqlv (label 7, 3-prong semi-leptonic)
    - Res2P_ZZ4q    # X -> ZZ -> qqqq (label 9, 4-prong)
    - QCD_187       # QCD generic (label 187, most common, 59442 available)
    - QCD_185       # QCD sub-type (label 185, 13847 available)

# OmniJet-alpha VQ-VAE tokenizer
tokenizer:
  repo_url: "https://github.com/uhh-pd-ml/omnijet_alpha.git"
  codebook_size: 8192  # VQVAENormFormer with num_codes=8192 (released checkpoint)
  # Preprocessing: part_pt -> log(pt_rel)-1.8; part_etarel -> 3*eta_rel (cut ±0.8);
  #                part_phirel -> 3*phi_rel (cut ±0.8)
  checkpoint_path: "/n/holystore01/LABS/iaifi_lab/Users/sambt/hep-llava-data/omnijet_alpha/checkpoints/vqvae_8192_tokens/model_ckpt.ckpt"
  input_features: ["pt_rel", "eta_rel", "phi_rel"]

# Physics encoder (transformer over VQ tokens)
physics_encoder:
  vocab_size: 8192  # must match tokenizer.codebook_size (OmniJet VQ-VAE num_codes)
  hidden_dim: 512
  num_layers: 6
  num_heads: 8
  dropout: 0.1
  max_seq_len: 128  # max constituents per jet

# MLP Projector (LLaVA 1.5 style)
projector:
  input_dim: 512   # must match physics_encoder.hidden_dim
  output_dim: 4096  # must match LLM hidden size
  # Architecture: Linear(input_dim, output_dim) -> GELU -> Linear(output_dim, output_dim)

# Base LLM
llm:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  torch_dtype: "bfloat16"
  use_flash_attention: false

# Caption & QA generation
captions:
  num_rule_based_templates: 15
  num_slot_fill_templates: 50
  num_llm_generated_per_class: 30
  qa_pairs_per_jet: 15
  difficulty_levels: ["factual", "kinematic", "reasoning"]
  # LLM-generated captions (Strategy 2) via OpenRouter
  llm_caption_model: "deepseek/deepseek-v3.2" # OpenRouter model ID
  llm_caption_max_tokens: 300

# Training Stage 1: Feature Alignment
stage1:
  learning_rate: 1.0e-3
  batch_size: 32
  num_epochs: 5
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  # Freeze: LLM, VQ-VAE tokenizer
  # Train: physics_encoder + projector
  dataloader_num_workers: 4
  contrastive:
    enabled: true          # supervised contrastive loss on pooled encoder features
    weight: 0.1            # weight of contrastive loss relative to LM loss
    temperature: 0.07      # NT-Xent temperature
    proj_dim: 128          # contrastive projection head output dim
  early_stopping:
    enabled: true
    patience: 8            # stop after 8 checks with no improvement
    min_delta: 0.001       # minimum EMA loss drop to count as progress
    check_every_n_steps: 500
    ema_alpha: 0.05        # slow smoothing — each step contributes 5% to EMA
    min_steps: 2000        # don't check during warmup noise

# Training Stage 2: Instruction Tuning
stage2:
  learning_rate: 2.0e-5
  batch_size: 16
  num_epochs: 5
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4
  # LoRA config for LLM
  lora:
    rank: 32
    alpha: 64
    dropout: 0.05
    use_dora: false        # set true to use DoRA (weight-decomposed LoRA)
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  gradient_checkpointing: true
  dataloader_num_workers: 4
  early_stopping:
    enabled: true
    patience: 8
    min_delta: 0.001
    check_every_n_steps: 500  # Stage 2 optimizer steps (after grad accum)
    ema_alpha: 0.05
    min_steps: 2000

# Evaluation
eval:
  batch_size: 32
  max_new_tokens: 256
  temperature: 0.1
  num_eval_samples_per_class: 200

# Logging
logging:
  use_wandb: true
  wandb_project: "physllava"
  wandb_entity: null          # W&B team/username; null = use default entity
  # wandb_run_id: null        # Override the W&B run ID (default: derived from run_name)
  log_every_n_steps: 10
  save_every_n_steps: 500
